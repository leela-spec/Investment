    scoring_method: percentile
    module_id: EquityRisk
    critical: true
    playbook_refs: [MARKET_CONDITIONS]

  - series_id: NDX
    name: "Nasdaq 100"
    asset_class: Equity
    frequency: D
    unit: index
    sources:
      - {type: stooq, locator: "^ndx"}
    higher_is_better: true
    scoring_method: percentile
    module_id: EquityRisk

  - series_id: RUT
    name: "Russell 2000"
    asset_class: Equity
    frequency: D
    unit: index
    sources:
      - {type: stooq, locator: "^rut"}
    higher_is_better: true
    scoring_method: percentile
    module_id: EquityRisk

  - series_id: DAX
    name: "DAX"
    asset_class: Equity
    frequency: D
    unit: index
    sources:
      - {type: stooq, locator: "^dax"}
    higher_is_better: true
    scoring_method: percentile
    module_id: EquityRisk

  - series_id: GOLD
    name: "Gold (spot)"
    asset_class: Commodities
    frequency: D
    unit: usd
    sources:
      - {type: stooq, locator: "xauusd"}
    higher_is_better: true
    scoring_method: percentile
    module_id: Commodities

  - series_id: COPPER
    name: "Copper futures"
    asset_class: Commodities
    frequency: D
    unit: usd
    sources:
      - {type: stooq, locator: "hg.f"}
    higher_is_better: true
    scoring_method: percentile
    module_id: Commodities
    needs_verification: true

  - series_id: EURUSD
    name: "EUR/USD"
    asset_class: FX
    frequency: D
    unit: rate
    sources:
      - {type: stooq, locator: "eurusd"}
    higher_is_better: true    # USD inverse cross-check
    scoring_method: percentile
    module_id: FX

  - series_id: US10Y_STOOQ
    name: "US 10y yield (market, Stooq)"
    asset_class: Rates
    frequency: D
    unit: pct
    sources:
      - {type: stooq, locator: "10usy.b"}
    higher_is_better: false
    scoring_method: zscore
    module_id: RatesLiquidity
    needs_verification: true
